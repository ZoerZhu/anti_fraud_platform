# 生产环境配置
spring:
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/anti_fraud_platform?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 10
          min-idle: 5

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

# 日志配置
logging:
  level:
    com.anti: info

# Springdoc Swagger配置 - 生产环境关闭
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://your-school-domain.example.com}
    max-age: 3600

deepseek:
  api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com/chat/completions}
  api-key: ${DEEPSEEK_API_KEY:}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  max-tokens: ${DEEPSEEK_MAX_TOKENS:2048}
  temperature: ${DEEPSEEK_TEMPERATURE:0.7}
  timeout-ms: ${DEEPSEEK_TIMEOUT_MS:15000}
